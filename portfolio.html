<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alex Beausire | Portfolio</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
  <link href="portfolio.css" rel="stylesheet" type="text/css">
  <link rel='icon' href='images/favicon.ico' type='images/favicon.ico'/>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    nav.navbar {
      z-index: 10;
    }
    #pres-wrap {
      position: fixed;
      top: 51px; /* below navbar */
      left: 0;
      right: 0;
      bottom: 0;
    }
    #pres-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  

  <div id="pres-wrap">
    <iframe id="figma-frame" src="https://embed.figma.com/slides/fwVInLeUtNea72tzf8NFPp/Alex-Beausire-%7C-Portfolio?node-id=1-177&embed-host=share" allowfullscreen></iframe>
  </div>

  <script>
    const frame = document.getElementById('figma-frame');
    // Focus iframe on load so arrow keys work immediately
    frame.addEventListener('load', () => frame.focus());
    // Re-focus if user clicks anywhere on the page
    document.addEventListener('click', () => frame.focus());
    // Also forward arrow key events from the parent page into the iframe
    document.addEventListener('keydown', (e) => {
      if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
        frame.focus();
      }
    });
  </script>

</body>
</html>
