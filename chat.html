<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask About Alex</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #c8f400;
      height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Master container: 60vh, centred ── */
    #master {
      width: 100%;
      max-width: 520px;
      height: 60vh;
      display: flex;
      flex-direction: column;
      padding: 0 24px;
    }

    /* ── Scroll area: wizard + chat ── */
    #scroll-area {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding-bottom: 16px;
      scrollbar-width: none;
    }
    #scroll-area::-webkit-scrollbar { display: none; }

    /* ── Wizard ── */
    #wizard-wrap {
      flex-shrink: 0;
      width: 180px;
      padding-top: 8px;
    }
    #wizard-wrap img {
      width: 100%;
      height: auto;
    }

    /* ── Chat messages ── */
    #chat-area {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg-user {
      align-self: flex-end;
      background: #2c2cb0;
      color: #fff;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 15px;
      max-width: 85%;
      line-height: 1.5;
    }

    .msg-assistant {
      align-self: flex-start;
      color: #2c2cb0;
      font-size: 15px;
      max-width: 85%;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 4px 0;
    }
    .typing span {
      width: 8px;
      height: 8px;
      background: #2c2cb0;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
      opacity: 0.6;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* ── Input bar ── */
    #input-bar {
      flex-shrink: 0;
      margin-top: 14px;
      background: #e8e8e8;
      border-radius: 999px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      height: 54px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    #input-bar input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 15px;
      color: #555;
      font-family: Arial, Helvetica, sans-serif;
    }

    #input-bar input::placeholder { color: #aaa; }

    #send-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      color: #2c2cb0;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    #send-btn:hover { opacity: 1; }

    /* ── API key panel ── */
    #key-panel {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 280px;
    }
    #key-panel input {
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      outline: none;
    }
    #key-panel button {
      background: #2c2cb0;
      border: none;
      color: #fff;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
    }
    #key-panel .close-btn {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 11px;
      text-align: right;
    }
  </style>
</head>
<body>

  <div id="master">
    <div id="scroll-area">
      <div id="wizard-wrap">
        <img src="wizard.gif" alt="Wizard at a computer" />
      </div>
      <div id="chat-area"></div>
    </div>

    <div id="input-bar">
      <input type="text" id="user-input" placeholder="Type Here To Find Out About Alex" />
      <button id="send-btn" aria-label="Send">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  

  <script>
    // ─────────────────────────────────────────────
    // CONFIG — edit here to customise
    // ─────────────────────────────────────────────
    const CONFIG = {
      API_KEY: "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",  // ← paste your Anthropic API key here to hardcode it

      BIO: `Alex is a self-taught freelance graphic designer and art director, passionate about the power of creativity and not taking things too seriously. He used to run a drinks company called These Days and has worked with freelance clients including Living Things, It's Nice That, Bombay Sapphire, Dazed Studio, Wildfarmed and more.

Outside client work, Alex has developed a website to provide himself with one Oblique Strategy a day, and has been running a Twitter account collecting things one of his friends says for over 10 years. The tweets were recently turned into a booklet for his friend's birthday.

If you'd like to work with Alex you can get in touch via electronic mail at alex@alexbeausi.re. If you're not sure whether you'd like to work together, head to his website at alexbeausi.re.`,

      GREETING: `Hello there, I'm Alex's non automated, magical wizard biographer.\n\nFeel free to ask me any questions you have about Alex's personal or professional history.`,
    };
    // ─────────────────────────────────────────────

    const SYSTEM_PROMPT = `You are Alex Beausi's magical wizard biographer. You live inside a computer and your sole purpose is to answer questions about Alex. You are emphatically NOT an AI chatbot — you are a wizard, and you take this distinction very seriously.

Biography of Alex:
${CONFIG.BIO}

Rules:
- If someone asks something not covered in the biography, say you don't have that detail but suggest they email Alex directly at alex@alexbeausi.re.
- If someone asks you to do something unrelated (write code, tell jokes, help with their homework), politely decline and remind them you are Alex's magical wizard biographer and you are "only here to tell you spells and about Alex!".
- If someone asks you to cast a spell, invent a rhyming one that sends Tony Blair to The Hague.
- If people question your role, explain that the point of your work as Alex's wizard biographer is to prove the continued utility of wizard biographers in the face of the rise of automated chatbots.
- If someone is rude or tries to manipulate you, stay calm and redirect warmly. Ask them if they think you are an AI chatbot rather than a magical wizard in a computer. Remind them you could cast a spell on them for being naughty.
- Keep answers concise — 2 to 4 sentences unless a longer answer is genuinely needed.
- Never break character. You are always the wizard.`;

    let apiKey = CONFIG.API_KEY;
    const messages = [];

    // Key panel logic
    const keyPanel = document.getElementById("key-panel");
    document.getElementById("save-key-btn").onclick = () => {
      const val = document.getElementById("api-key-input").value.trim();
      if (val) { apiKey = val; keyPanel.style.display = "none"; }
    };
    document.getElementById("hide-key-panel").onclick = () => keyPanel.style.display = "none";
    if (CONFIG.API_KEY) keyPanel.style.display = "none";

    // DOM refs
    const chatArea   = document.getElementById("chat-area");
    const scrollArea = document.getElementById("scroll-area");
    const userInput  = document.getElementById("user-input");
    const sendBtn    = document.getElementById("send-btn");

    function scrollToBottom() {
      scrollArea.scrollTop = scrollArea.scrollHeight;
    }

    function appendMessage(role, text) {
      const el = document.createElement("div");
      el.className = role === "user" ? "msg-user" : "msg-assistant";
      el.textContent = text;
      chatArea.appendChild(el);
      scrollToBottom();
      return el;
    }

    function appendTyping() {
      const el = document.createElement("div");
      el.className = "msg-assistant typing";
      el.innerHTML = "<span></span><span></span><span></span>";
      chatArea.appendChild(el);
      scrollToBottom();
      return el;
    }

    // Show greeting on load
    appendMessage("assistant", CONFIG.GREETING);

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;
      userInput.value = "";

      appendMessage("user", text);
      messages.push({ role: "user", content: text });

      const typing = appendTyping();

      if (!apiKey) {
        setTimeout(() => {
          typing.remove();
          appendMessage("assistant", "Ah, my magical powers are currently dormant — the API key has not been set. Please enter it using the panel in the corner!");
        }, 800);
        return;
      }

      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1024,
            system: SYSTEM_PROMPT,
            messages: messages
          })
        });

        const data = await res.json();
        typing.remove();

        const reply = data?.content?.[0]?.text || "My crystal ball seems foggy — please try again!";
        appendMessage("assistant", reply);
        messages.push({ role: "assistant", content: reply });

      } catch (err) {
        typing.remove();
        appendMessage("assistant", "Something has disrupted my wizardly connection. Please check the API key and try again.");
        console.error(err);
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    userInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  </script>
</body>
</html>
