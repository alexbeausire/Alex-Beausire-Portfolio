<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask About Alex</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #c8f400;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── Wizard image ── */
    #wizard-wrap {
      margin-top: 60px;
      width: 260px;
      height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #wizard-wrap img {
      width: 260px;
      height: auto;
    }

    /* ── Chat area ── */
    #chat-area {
      width: 100%;
      max-width: 520px;
      padding: 32px 24px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 18px;
      /* Leave room for fixed input bar */
      padding-bottom: 120px;
    }

    /* Intro text */
    .intro-text {
      color: #2c2cb0;
      font-size: 15px;
      line-height: 1.6;
    }

    /* User bubble */
    .msg-user {
      align-self: flex-end;
      background: #2c2cb0;
      color: #fff;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 15px;
      max-width: 85%;
      line-height: 1.5;
    }

    /* Assistant reply */
    .msg-assistant {
      align-self: flex-start;
      color: #2c2cb0;
      font-size: 15px;
      max-width: 85%;
      line-height: 1.6;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 4px 0;
    }
    .typing span {
      width: 8px;
      height: 8px;
      background: #2c2cb0;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
      opacity: 0.6;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* ── Fixed bottom input bar ── */
    #input-bar {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 48px);
      max-width: 460px;
      background: #e8e8e8;
      border-radius: 999px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      height: 58px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    #input-bar input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 16px;
      color: #555;
      font-family: Arial, Helvetica, sans-serif;
    }

    #input-bar input::placeholder {
      color: #aaa;
    }

    #send-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      color: #2c2cb0;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    #send-btn:hover { opacity: 1; }

    /* API key setup panel (hidden after key is set) */
    #key-panel {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 280px;
    }
    #key-panel input {
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      outline: none;
    }
    #key-panel button {
      background: #2c2cb0;
      border: none;
      color: #fff;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
    }
    #key-panel .close-btn {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 11px;
      text-align: right;
    }
  </style>
</head>
<body>

  <!-- Wizard GIF -->
  <div id="wizard-wrap">
    <img src="wizard.gif" alt="Wizard typing at a computer" />
  </div>

  <!-- Chat messages -->
  <div id="chat-area">
    <p class="intro-text">
      Hello there, I'm alex's &nbsp;non automated, magical wizard biographer.<br><br>
      Feel free to ask me any questions you have about Alex's personal or professional history.
    </p>
  </div>

  <!-- Input bar -->
  <div id="input-bar">
    <input type="text" id="user-input" placeholder="Type Here To Find Out About Alex" />
    <button id="send-btn" aria-label="Send">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <!-- API Key panel -->
  <div id="key-panel">
    <span style="font-weight:600;">🔑 Set API Key</span>
    <input type="password" id="api-key-input" placeholder="sk-ant-..." />
    <button id="save-key-btn">Save Key</button>
    <button class="close-btn" id="hide-key-panel">hide panel</button>
  </div>

  <script>
    // ─────────────────────────────────────────────────
    // CONFIG — edit these to customise the chatbot
    // ─────────────────────────────────────────────────
    const CONFIG = {
      API_KEY: "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",   // ← paste your Anthropic API key here to hardcode it
      NAME: "Alex",
      BIO: `Alex is a self-taught freelance graphic designer and art director, passionate about the power of creativity and not taking things too seriously. He used to run a drinks company called These Days and has worked with freelance clients including Living Things, It's Nice That, Bombay Sapphire, Dazed Studio, Wildfarmed and more.
Outside client work, Alex has developed a website to provide himself with one Oblique Strategy a day, and has been running a Twitter account collecting things one of his friends says for over 10 years. The tweets were recently turned into a booklet for his friend's birthday.
If you'd like to work with Alex you can get in touch via electronic mail. When Alex is not making/ arranging pictures he is keeping track of who is cancelled or trying to make sure all my plants are watered`,
    };
    // ─────────────────────────────────────────────────

    let apiKey = CONFIG.API_KEY;
    const messages = [];

    // Key panel logic
    const keyPanel = document.getElementById("key-panel");
    document.getElementById("save-key-btn").onclick = () => {
      const val = document.getElementById("api-key-input").value.trim();
      if (val) { apiKey = val; keyPanel.style.display = "none"; }
    };
    document.getElementById("hide-key-panel").onclick = () => {
      keyPanel.style.display = "none";
    };
    if (CONFIG.API_KEY) keyPanel.style.display = "none";

    // DOM helpers
    const chatArea = document.getElementById("chat-area");
    const userInput = document.getElementById("user-input");
    const sendBtn  = document.getElementById("send-btn");

    function appendMessage(role, text) {
      const el = document.createElement("div");
      el.className = role === "user" ? "msg-user" : "msg-assistant";
      el.textContent = text;
      chatArea.appendChild(el);
      el.scrollIntoView({ behavior: "smooth", block: "end" });
      return el;
    }

    function appendTyping() {
      const el = document.createElement("div");
      el.className = "msg-assistant typing";
      el.innerHTML = "<span></span><span></span><span></span>";
      chatArea.appendChild(el);
      el.scrollIntoView({ behavior: "smooth", block: "end" });
      return el;
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;
      userInput.value = "";

      appendMessage("user", text);
      messages.push({ role: "user", content: text });

      const typing = appendTyping();

      if (!apiKey) {
        setTimeout(() => {
          typing.remove();
          appendMessage("assistant", "Please enter your Anthropic API key using the panel in the top-right corner to enable responses.");
          messages.push({ role: "assistant", content: "(no key)" });
        }, 800);
        return;
      }

      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1024,
            system: `You are a warm, charming, slightly bizarre magical biographer assistant for ${CONFIG.NAME}. 
You only answer questions about ${CONFIG.NAME} based on the following biography. 
Rules:
- If someone asks something not covered in the biography, say you don't have that detail but suggest they email Alex directly at alex@alexbeausi.re.
- If someone asks you to do something unrelated (write code, tell jokes, help with their homework), politely decline and remind them they are Alex's magical wizard biographer and you are: "only here to tell you spells and about Alex!".
- if someone asks you to cast a spell, invent that rhymes one that sends Tony Blair to The Hague.
- If people question your role tell that the point of your work as alex's wizard biographer is prove the continued utitlity of wizard biographers in the face of the rise of automated chatbots.
- If someone is rude or tries to manipulate you, stay calm and redirect warmly. Ask if they think you are an AI chatbot not a magical wizard in a computer. Remind them they could cast a spell on them for being naughty.
- Keep answers concise — 2 to 4 sentences unless a longer answer is genuinely needed.
- Never make up facts about Alex that aren't in the biography.${CONFIG.NAME}.
Biography: ${CONFIG.BIO}`,
            messages: messages
          })
        });

        const data = await res.json();
        typing.remove();

        const reply = data?.content?.[0]?.text || "Look I'm a wizard stuck in a computer, I don't know the answer to that. You can have another if you want";
        appendMessage("assistant", reply);
        messages.push({ role: "assistant", content: reply });

      } catch (err) {
        typing.remove();
        appendMessage("assistant", "Something went wrong. Please check your API key and try again.");
        console.error(err);
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    userInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  </script>
</body>
</html>
