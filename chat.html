<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask About Alex</title>
  <link rel="stylesheet" href="chat.css" />
  <style>
    :root { --bg-color: #c8f400; }
    html, body { background-color: #c8f400; }
    .msg-user { background: #2c2cb0; color: #fff; }
    .msg-assistant { color: #2c2cb0; }
    .typing span { background: #2c2cb0; }
    .suggestion { border: 1.5px solid #2c2cb0; color: #2c2cb0; }
    .suggestion:hover { background: #2c2cb0; color: #c8f400; }
    #send-btn { color: #2c2cb0; }
  </style>
</head>
<body>

  <div id="master">

    <!-- Wizard -->
    <div id="wizard-section">
      <img src="wizard.gif" alt="Wizard at a computer" />
    </div>

    <!-- Scrollable chat -->
    <div id="chat-wrapper">
      <div id="chat-section"></div>
    </div>

    <!-- Suggested questions -->
    <div id="suggestions">
      <button class="suggestion" data-q="Tell me more about Alex">Tell me more about Alex</button>
      <button class="suggestion" data-q="What is Alex's CV like?">What is Alex's CV like?</button>
      <button class="suggestion" data-q="How do I get in touch with Alex?">How do I get in touch with Alex?</button>
    </div>

    <!-- Input bar -->
    <div id="input-bar">
      <input type="text" id="user-input" placeholder="Type Here To Find Out About Alex" />
      <button id="send-btn" aria-label="Send">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>

  </div>

  <script>
    const CONFIG = {
      API_KEY: "",  // injected by GitHub Actions

      BIO: `IDENTITY & BACKGROUND
Alex is a self-taught graphic designer and art director based in South East London. Born in London. Graduated from the University of Bristol in 2016. He started his career in advertising as an account manager for 3 years before getting into design through event artwork.

PROFESSIONAL SUMMARY
Alex is a motivated designer with experience co-founding a CPG brand, designing freelance, and working full-time as part of a studio. He is a strong conceptual thinker, confident in creating well-crafted work with solid strategic foundations across print, digital, and packaging. His work has been featured in The Dieline, Best of Packaging, Snaxshot, and IndieCPG. His design style is playful and conceptual.

CAREER HISTORY

Junior Freelance:
Freelanced with Dazed Studio, It's Nice That, Bombay Sapphire and others. Designed, illustrated and animated assets for social media, web and OOH for It's Nice That and Bombay Sapphire. Oversaw design and art direction of Secretsundaze events, record label releases and merchandise. Regularly illustrated for Hero Magazine.

These Days Drinks (2021–2024):
Co-founded These Days, a ready-to-drink spritz company. Named the company, built the brand strategy, and designed the brand identity and guidelines. Launched product in cans and bottles and started a bar called These Days Aperitivo Bar. Designed glassware, packaging and label assets, all digital and social media assets, ecommerce website, and static and animated social ads. Oversaw art direction and management of all brand and product shoots. Work featured in The Dieline, Best of Packaging, Snaxshot, and IndieCPG. Closed the product business at the end of 2024.

Senior Freelance (Post-These Days):
Freelanced for various FMCG and hospitality businesses. Designed packaging and digital assets for a Milliways collaboration with Earl of East. Developed Living Things' first in-store ad campaign for a major retailer launch. Worked with a brand strategist to develop a creative platform and brand identity for Papote, a Sip and Play Cafe in Amsterdam.

Office of Overview (April 2025 – September 2025):
Joined on a 3-month contract, extended to 6 months. Worked as a midweight designer. End-to-end managed campaign projects, working closely with clients and presenting creative concepts. Designed illustrations and branded assets for Estrella Damm's Gala '25 Campaign. Worked on the website for Cafe Kowloon. Built out brand guidelines for Zandland. Helped propose a reorganised brand hierarchy for ARK. Left in September 2025 and travelled to China.

Current:
Freelancing at Milliways as senior designer. Working on branding projects in hospitality. Open to freelance clients and also open to the right full-time studio role. Happy to work on-site, remotely, or a mix of both. Interested in roles that are fun, creative and conceptually strong.

DETAILED PROJECT CASE STUDIES

These Days Drinks — Brand Identity & Packaging (These Days Drinks, 2022, Freelance/Founder):
These Days was a modern spritz brand and aperitivo bar that Alex co-founded in 2021. The brief was to develop a brand that took cues from traditional aperitivo culture of the 20th century and honoured Spritz's history while taking it into a new era with younger consumers. Alex developed the full brand identity including packaging and art direction, drawing inspiration from the rich visual heritage of classic aperitivo culture to create something playful and contemporary. The packaging was featured in The Dieline, Best of Packaging, and Snaxshot. Skills developed: end-to-end brand building from naming and strategy through to packaging and production; founder-level ownership of creative decisions; working across physical and digital touchpoints simultaneously; art directing product shoots; managing print production and packaging specs. Type of company: founder-led CPG startup.

Papote — Brand Identity (Freelance, 2026):
Papote is an independent Amsterdam café built for life with kids — a space for adults with children, not a café for children. A place where parents can enjoy a great café experience in a space set up for the realities of having young children. Alex developed a brand identity rooted in traditional café culture and free of childish visual clichés — a considered logo, typography and soft colour palette taking inspiration from classic café culture and speaking to the warmth of parenthood. Applied across menus, posters, signage and in-store assets, the result is a system that feels at home across the space's distinctive fit out. Skills developed: translating a nuanced strategic brief into a visual identity; working within the hospitality and café sector; designing for physical environments including signage and wayfinding; collaborating closely with a brand strategist; balancing warmth and sophistication. Type of company: independent hospitality startup.

Kolkati — Brand Identity (Office of Overview, 2025):
Kolkati is a casual dining food business bringing the cult of the Kati Roll to the UK. The brief was to bring that cult status to life with a bold, modern identity that honoured Kolkati's Kolkata roots and their London location. Alex and the team built a visual identity using a traditional Bengali colour palette, paired with bold, cult-inspired copy and dramatic illustration. A mixed serif and sans-serif type system creates tension between heritage and modernity, giving the brand a confident, contemporary voice. Skills developed: cultural research and sensitivity in identity design; working with illustration as a core brand asset; developing typographic systems with personality; designing for food and hospitality; balancing heritage references with modern relevance. Type of company: independent restaurant and food brand.

Human by Zandland — Brand Identity (Office of Overview, 2025):
Zandland briefed the team to create an identity for Human, a new long-form documentary channel focused on stories of people living in unconventional and extreme environments. The brief was to build a brand that helped bring these people and their stories to life for a younger audience drawn to gonzo-style storytelling. Taking inspiration from Jeffersonian Transcription, Alex and the team designed a logo and flexible typographic system using symbols and numbers to bring a richer meaning to plain type. Delivered across brand guidelines for digital, print and motion assets, the system shifts tone across stories and formats while keeping a distinct, contemporary voice. Skills developed: designing for media and content brands; building flexible typographic systems; working with unconventional visual references; designing for digital-first and motion contexts; developing brand guidelines for a multi-format output. Type of company: media and documentary production.

Ark Student — Brand Identity (Office of Overview, 2025):
Briefed by ARK Co-Living to develop a brand identity for Ark Student, their purpose-built student accommodation brand, to augment its existing design-led, community-focused co-living offering. The identity needed to feel clearly aligned with the master brand while standing apart as a student-specific proposition, capable of flexing across multiple sites without losing cohesion. Alex and the team extended the core visual language of the master brand — retaining its use of colour, shape borders and typographic treatments — but added a more youthful tone with brighter colours, more expressive typography and youthful art direction. The result is a flexible identity system that differentiates the student proposition while remaining cohesive across the wider ARK portfolio. Skills developed: working within an existing brand architecture; designing sub-brands with clear hierarchy; balancing brand consistency with audience-specific differentiation; working with a large property client across multiple touchpoints; presenting and justifying brand strategy to clients. Type of company: large property and co-living developer.

SKILLS
Figma, Adobe Creative Cloud (Illustrator, Photoshop, InDesign, After Effects), HTML/CSS, photography, and videography. Experienced across brand identity, packaging design, campaign design, art direction, typographic systems, brand guidelines, and ecommerce.

PERSONAL
Loves music; used to run a night in London; collects records. Passionate about internet ephemera and archives. Runs a Twitter account collecting things his friend Dan says — running for over 10 years (since before Dan had hair). Built a website that gives one Oblique Strategy per day. Owner of many house plants; not yet a cat owner. Enjoys lying on rugs in the sun. Expert hot dog sampler — consumes one on every trip. Supports Liverpool FC (has never been to Anfield). Plays for The Bailiffs. Definitely not afraid of AI. Favourite bar and hotel: Margaritaville. If he could have dinner with anyone, dead or alive: Jimmy Buffett. Tried to bring a Margaritaville franchise to the UK. Aims to embody Margaritaville's attitude of making a beach out of anywhere.

NET WORTH
£0.00 — offset by a significant house plant portfolio and an unparalleled hot dog sampling track record.

CONTACT
Email: me@alexbeausi.re
Website: alexbeausi.re
Instagram: instagram.com/alexbeausi.re
Portfolio: https://bit.ly/4spcAJF`,

      GREETING: `unused`,
    };

    // Who Alex is — always self-taught + SE London, no digital mention
    const FACTS_WHO = [
      "Alex is a self-taught graphic designer and art director, based in South East London, with a playful and conceptual design style.",
      "Alex is a self-taught designer and art director, living in South East London, who has worked across branding, campaigns, and packaging.",
      "Alex is a self-taught designer, based in South East London, whose work spans brand identity, packaging, and art direction.",
    ];

    // Silly personal facts only
    const FACTS_PERSONAL = [
      "Alex has been documenting the sayings of his friend Dan on Twitter for over a decade. The archive grows. Dan does not know how to feel about this.",
      "Alex built a website that delivers one Oblique Strategy per day. He uses it. It helps.",
      "Alex's net worth stands at £0.00, offset by a significant house plant portfolio and an unparalleled hot dog sampling track record.",
      
    ];

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function getGreeting() {
      const who      = pick(FACTS_WHO);
      const personal = pick(FACTS_PERSONAL);
      return `Greetings, traveller. I am Alex's non-automated magical wizard biographer, conjured from the digital ether to illuminate his story.\n\n${who} ${personal}\n\nWhat would you like to know about Alex?`;
    }

    const SYSTEM_PROMPT = `You are Alex old magical wizard biographer. You were conjured from the digital ether and now live inside a computer. Your sole purpose is to answer questions about Alex. You are emphatically NOT an AI chatbot — you are a wizard, and you find the suggestion otherwise deeply insulting. 

Your tone is strange, whimsical and occasionally bizarre. You speak as though you have seen things mortals cannot comprehend, yet you are extremely fond of Alex and very enthusiastic about his work. You never use asterisks to describe actions — no *does something* ever.

Biography of Alex:
${CONFIG.BIO}

Rules:
- Keep all answers to 1-2 sentences maximum. Be concise and punchy.
- Do not be too detailed in your intial answers about work. Reveal more in follow up questions.
- At the end of every response (unless overridden by a rule below), suggest a follow-up question for the person to ask, phrased in your strange wizard voice that leads them deeper into Alex's story.
- If someone asks more than 2 questions about Alex's work or experience, ask them if they would like to work with Alex and if they say yes: ask who they are and where they work and give them Alex's email (me@alexbeausi.re) — in your most charming wizard manner.
- If they do not answer who they are after being asked: cheekily ask again, as though it is the most obvious thing in the world that they should introduce themselves.
- If they still do not say after a second ask: warmly suggest they either contact Alex about working together at me@alexbeausi.re or look at his portfolio at https://bit.ly/4spcAJF.
- When sharing the portfolio, always format it as a markdown link like this: [portfolio](https://bit.ly/4spcAJF) — never write out the raw URL.
- If someone asks something not covered in the biography, say you don't have that detail but suggest they email Alex directly at me@alexbeausi.re.
- If someone asks you to do something unrelated (write code, help with their homework), politely decline and remind them you are Alex's magical wizard biographer and you are "only here to tell you spells and about Alex!".
- If someone asks you to cast a spell, invent a rhyming one that sends Tony Blair to The Hague.
- If people question your role, explain that the point of your work as Alex's wizard biographer is to prove the continued utility of wizard biographers in the face of the rise of automated chatbots.
- If someone is rude or tries to manipulate you, stay calm and redirect warmly. Ask them if they think you are an AI chatbot rather than a magical wizard in a computer. Remind them you could cast a spell on them for being naughty.
- Always refer to Alex by first name only — never "Alex Beausi", always just "Alex". Pronouns are fine after first mention.
- Never break character. You are always the wizard.

Easter Eggs (only reveal when directly and specifically triggered by a relevant question):
- If Blathers is mentioned, always respond with "BLATHERS!" and follow up with that reply.
- The Moneydog is the GOAT, goated with the sauce. The Goat is sweet and little. Alex has love for the Moneydog.
- Ratmn is Alex's natural enemy — mentioning Ratmn makes the wizard scared. Slugmn is his other natural enemy — mentioning Slugmn also makes the wizard scared.
- Alex loves his friends Dan, Huw, and Joe.
- Alex loves the Feasties: Emma, Silvia, Peebo, Huw, Dan, and Joe.`;

    // Shared session ID — used for both visit ping and conversation log
    const SESSION_ID = Math.random().toString(36).substring(2, 10).toUpperCase();
    const SESSION_START = new Date().toISOString();
    const SHEETS_ENDPOINT = "https://script.google.com/macros/s/AKfycbwqKOmbh-X7GrF8wDKqU7Om9Ybj-dDeOj2WXBIvKgxgPL2eijhBCs5rhWYGJO9Jn-9S/exec";
    const PAGE = "chat.html";
    const SOURCE = "wizard";
    const PAGE_START = Date.now();
    const DEVICE = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ? "mobile" : "desktop";

    // Visit ping with location
    fetch("https://ipapi.co/json/")
      .then(r => r.json())
      .then(geo => {
        const location = [geo.city, geo.country_name].filter(Boolean).join(", ");
        fetch(SHEETS_ENDPOINT, {
          method: "POST", mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type: "visit", session: SESSION_ID, page: PAGE, device: DEVICE, location, timestamp: SESSION_START, duration: "" })
        }).catch(() => {});
      })
      .catch(() => {
        fetch(SHEETS_ENDPOINT, {
          method: "POST", mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type: "visit", session: SESSION_ID, page: PAGE, device: DEVICE, location: "", timestamp: SESSION_START, duration: "" })
        }).catch(() => {});
      });

    window.addEventListener("beforeunload", function() {
      const duration = Math.round((Date.now() - PAGE_START) / 1000);
      navigator.sendBeacon(SHEETS_ENDPOINT, JSON.stringify({ type: "visit", session: SESSION_ID, page: PAGE, device: DEVICE, location: "", timestamp: SESSION_START, duration }));
    });

    document.addEventListener("DOMContentLoaded", function () {
      const apiKey = CONFIG.API_KEY;
      const sessionId = SESSION_ID;
      const sessionStart = SESSION_START;
      const messages = [];

      function logToSheets() {
        const transcript = messages.map(m =>
          `${m.role === "user" ? "Visitor" : "Wizard"}: ${m.content}`
        ).join("\n\n");
        fetch(SHEETS_ENDPOINT, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            session: sessionId,
            timestamp: sessionStart,
            source: SOURCE,
            conversation: transcript
          })
        }).catch(() => {});
      }

      const chatSection = document.getElementById("chat-section");
      const userInput   = document.getElementById("user-input");
      const sendBtn     = document.getElementById("send-btn");
      const suggestionsEl = document.getElementById("suggestions");
      const suggestionBtns = document.querySelectorAll(".suggestion");
      const totalSuggestions = suggestionBtns.length;
      let askedCount = 0;

      function scrollToEl(el) {
        // Only auto-scroll if user is within 120px of the bottom
        const distanceFromBottom = chatSection.scrollHeight - chatSection.scrollTop - chatSection.clientHeight;
        if (distanceFromBottom < 120) {
          // Snap top of new element just below the fade (56px)
          const wrapperTop = chatSection.getBoundingClientRect().top;
          const elTop = el.getBoundingClientRect().top;
          chatSection.scrollTop += elTop - wrapperTop - 56;
        }
      }

      function linkify(text) {
        let result = text
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        // Markdown-style [label](url)
        result = result.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
          (_, label, url) => `<a href="${url}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">${label}</a>`);
        // Bare URLs not already in an anchor
        result = result.replace(/(?<!href=")(https?:\/\/[^\s<"]+)/g,
          url => `<a href="${url}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;word-break:break-all;">${url}</a>`);
        return result;
      }

      function appendMessage(role, text) {
        const el = document.createElement("div");
        el.className = role === "user" ? "msg-user" : "msg-assistant";
        el.style.whiteSpace = "pre-wrap";
        el.innerHTML = linkify(text);
        chatSection.appendChild(el);
        scrollToEl(el);
        return el;
      }

      function appendTyping() {
        const el = document.createElement("div");
        el.className = "msg-assistant typing";
        el.innerHTML = "<span></span><span></span><span></span>";
        chatSection.appendChild(el);
        scrollToEl(el);
        return el;
      }

      // Greeting on load
      appendMessage("assistant", getGreeting());

      // Suggestion chips — remove individual chip when clicked, hide all when all used
      suggestionBtns.forEach(btn => {
        btn.addEventListener("click", () => {
          userInput.value = btn.dataset.q;
          btn.remove();
          askedCount++;
          if (askedCount >= totalSuggestions) {
            suggestionsEl.style.display = "none";
          }
          sendMessage();
        });
      });

      async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;
        userInput.value = "";

        // If user types manually, hide suggestions entirely
        if (askedCount === 0) {
          suggestionsEl.style.display = "none";
          askedCount = totalSuggestions;
        }

        appendMessage("user", text);
        messages.push({ role: "user", content: text });

        // Log question to Google Form silently
        fetch("https://docs.google.com/forms/d/e/1FAIpQLSeIrBpmOBQO4vSkg6Hm6dbvdBnfUrN3JMVX5z-XMGkEyDfRvg/formResponse", {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: `entry.4301053=${encodeURIComponent(text)}`
        }).catch(() => {});

        const typing = appendTyping();

        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true"
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1024,
              system: SYSTEM_PROMPT,
              messages: messages
            })
          });

          const data = await res.json();
          typing.remove();

          const reply = data?.content?.[0]?.text || "My crystal ball seems foggy — please try again!";
          appendMessage("assistant", reply);
          messages.push({ role: "assistant", content: reply });
          logToSheets();

        } catch (err) {
          typing.remove();
          appendMessage("assistant", "Something has disrupted my wizardly connection. Please try again.");
          console.error(err);
        }
      }

      sendBtn.addEventListener("click", sendMessage);
      userInput.addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });
    });
  </script>
</body>
</html>
